<!DOCTYPE html>
<html>
<head>

<title>File Cleaner AI</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
min-height:100vh;
font-family:Inter,Arial;
background:#050505;
color:white;

}


body::before{

content:"";
position:fixed;
width:600px;
height:600px;
background:#6366f1;
filter:blur(180px);
top:-200px;
left:-200px;
animation:move 10s infinite alternate;

}


@keyframes move{

from{
transform:translate(0,0);
}

to{
transform:translate(300px,200px);
}

}



button{

background:#6366f1;
border:none;
color:white;
padding:14px 22px;
border-radius:14px;
cursor:pointer;
transition:.3s;
font-size:15px;

}


button:hover{

transform:translateY(-3px);
box-shadow:0 10px 30px #6366f155;

}



#loginPage{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

}



.login{

width:380px;
padding:40px;
background:#ffffff12;
backdrop-filter:blur(25px);
border:1px solid #ffffff22;
border-radius:30px;
text-align:center;

}


.login input{

width:100%;
padding:15px;
margin:8px 0;

background:#111827;
border:0;
border-radius:12px;

color:white;

}



#error{

color:#ef4444;

}



.container{

max-width:1200px;
margin:auto;
padding:40px;

}



.logo{

font-size:60px;
font-weight:900;

background:linear-gradient(90deg,#fff,#818cf8);
-webkit-background-clip:text;
color:transparent;

}



.subtitle{

color:#aaa;
font-size:20px;

}



.discord{

margin-top:20px;
padding:15px;
background:#5865F2;
border-radius:15px;
display:inline-block;

}


.discord a{

color:white;
text-decoration:none;
font-weight:bold;

}



.card{

margin-top:30px;

background:#ffffff10;
backdrop-filter:blur(20px);

border-radius:30px;

padding:35px;

border:1px solid #ffffff22;

}



.drop{

padding:50px;

border:2px dashed #6366f1;

border-radius:25px;

text-align:center;

}



.stats{

display:flex;
gap:20px;
margin-top:20px;

}



.stat{

background:#111827;
padding:20px;
border-radius:15px;

}



textarea{

width:100%;
height:500px;

margin-top:20px;

background:#020617;

color:#4ade80;

border-radius:20px;

padding:20px;

font-family:monospace;

border:1px solid #333;

}



footer{

text-align:center;

padding:30px;

color:#777;

}



</style>

</head>


<body>



<div id="loginPage">


<div class="login">

<h1>
🧹 File Cleaner AI
</h1>

<p>
Shadow Gecko Access
</p>


<input id="username" placeholder="Username">


<input id="password" type="password" placeholder="Password">


<button onclick="login()">
Login
</button>


<p id="error"></p>


<br>

<div class="discord">

💬
<a href="https://discord.gg/5ceAuUa5uJ" target="_blank">
Get access on Discord
</a>

</div>


</div>


</div>






<div id="app" style="display:none">


<div class="container">


<div class="logo">

🧹 File Cleaner AI

</div>


<p class="subtitle">

Clean your projects. Prepare them for AI.

</p>



<div class="discord">

💬
<a href="https://discord.gg/5ceAuUa5uJ" target="_blank">
Join Shadow Gecko Discord
</a>

</div>




<div class="card">



<div class="drop">


<h2>
📁 Project Scanner
</h2>


<p>
Convert your project into AI-ready context
</p>


<button onclick="selectFolder()">

Choose Folder

</button>


</div>




<br>


<label>

<input type="checkbox" id="includeCode">

Include code files

</label>



<div class="stats">


<div class="stat">

Files:
<b id="files">0</b>

</div>


<div class="stat">

Characters:
<b id="chars">0</b>

</div>


</div>




<br>



<button onclick="copyText()">

📋 Copy

</button>


<button onclick="downloadText()">

💾 Export

</button>


<button onclick="clearAll()">

🗑 Clear

</button>



<textarea id="output"
placeholder="Your AI context appears here...">
</textarea>



</div>


</div>



<footer>

© <span id="year"></span> Shadow Gecko
<br>
File Cleaner AI

</footer>


</div>






<script>


document.getElementById("year").innerHTML =
new Date().getFullYear();





function login(){


let u =
username.value;


let p =
password.value;



if(u==="root" && p==="root"){


loginPage.style.display="none";

app.style.display="block";


}

else{


error.innerHTML=
"❌ Invalid login";


}


}





let result="";

let count=0;





async function selectFolder(){


result="";

count=0;



let folder =
await window.showDirectoryPicker();



result +=
"PROJECT: "
+folder.name
+"\n\n";



await scan(folder,"");



update();


}






async function scan(folder,path){


for await(let item of folder.values()){


if(item.kind==="directory"){


result +=
path+"📂 "+item.name+"/\n";


await scan(
item,
path+"   "
);


}


else{


count++;


result +=
path+"📄 "+item.name;



if(includeCode.checked){


try{


let file =
await item.getFile();


let text =
await file.text();



result +=

"\n\n===== "
+item.name+
" =====\n"

+text+

"\n===== END =====\n";


}

catch{}



}



result+="\n";


}



}


}







function update(){

output.value=result;

files.innerHTML=count;

chars.innerHTML=result.length;

}





function copyText(){

navigator.clipboard.writeText(
output.value
);

}




function downloadText(){


let blob =
new Blob(
[result],
{
type:"text/plain"
}
);



let a =
document.createElement("a");


a.href =
URL.createObjectURL(blob);


a.download =
"File_Cleaner_AI.txt";


a.click();


}





function clearAll(){

result="";

count=0;

update();

}



</script>


</body>
</html>
